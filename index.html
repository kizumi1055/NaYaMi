<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食べログ風 評価ページ</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f2f2f2;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        
        /* Store Signboard Image */
        .shop-signboard {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background-color: #ccc;
            background-image: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=1000&auto=format&fit=crop');
        }

        /* Tabs */
        .tabs {
            display: flex;
            background-color: #f8f8f8;
            border-bottom: 2px solid #a47e5b;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            border-right: 1px solid #ddd;
        }
        .tab.active {
            background-color: #a47e5b;
            color: #fff;
        }
        
        .content-wrapper {
            display: flex;
            padding: 20px;
            gap: 30px;
        }
        
        /* Left Main Content */
        .main-content {
            flex: 1;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .review-card {
            border-bottom: 1px dashed #ccc;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .reviewer-info {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background-color: #ccc;
            border-radius: 5px;
            margin-right: 10px;
            background-size: cover;
        }
        .reviewer-name {
            font-weight: bold;
            color: #0066cc;
            font-size: 14px;
        }
        .reviewer-stats {
            font-size: 12px;
            color: #666;
        }
        .rating-row {
            display: flex;
            align-items: center;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .stars {
            color: #e65100;
            font-size: 16px;
            margin-right: 5px;
        }
        .score {
            color: #e65100;
            font-weight: bold;
            font-size: 18px;
            margin-right: 15px;
        }
        .price {
            color: #666;
            font-size: 13px;
        }
        .visit-date {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        .review-text {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
